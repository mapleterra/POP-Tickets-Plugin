name: Build & Release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download Dalamud (staging)
        run: |
          $url = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dest = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $url -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip $dest
        shell: pwsh

      - name: Restore
        run: dotnet restore POPTickets/POPTickets.csproj

      - name: Build
        run: dotnet build POPTickets/POPTickets.csproj --configuration Release --no-restore

      # ── Release: runs only on version tags ──────────────────────────────
      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $outDir  = "POPTickets/bin/Release/net9.0-windows"
          # Stable name so repo.json /releases/latest/download/ URL never changes
          $zipName = "POPTickets-latest.zip"
          Copy-Item "POPTickets/manifest.json" "$outDir/manifest.json" -Force
          Compress-Archive -Path "$outDir/POPTickets.dll","$outDir/manifest.json" `
                           -DestinationPath $zipName
        shell: pwsh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: POPTickets-latest.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
